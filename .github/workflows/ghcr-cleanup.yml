name: Cleanup old container images

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    # dataaxiom/ghcr-cleanup-action still ships on Node.js 20 (v1.0.16 is the
    # latest release as of 2025). Force the runner to execute it on Node.js 24
    # so the upcoming Node 20 removal (Sep 2026) doesn't break the schedule.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Delete untagged and old images
        uses: dataaxiom/ghcr-cleanup-action@v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: gitecho
          owner: ${{ github.repository_owner }}
          # Remove untagged manifests that are NOT referenced by any tagged
          # multi-arch manifest list (safe for the per-arch children of :latest).
          delete-untagged: true
          # Keep sha- tagged builds for traceability, but only the newest 20.
          older-than: 30 days
          keep-n-tagged: 20
          # Never delete these important tags.
          exclude-tags: latest
