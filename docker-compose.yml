services:
  gitecho:
    build: .
    container_name: gitecho
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Optional: match ownership of bind-mounted host directories.
      # Leave unset when using the named volumes below; set to your host
      # user's UID/GID (e.g. `id -u` / `id -g`) when using bind mounts.
      PUID: ${PUID:-}
      PGID: ${PGID:-}

      # Provider tokens (configure at least one)
      GITHUB_PAT: ${GITHUB_PAT}
      GITHUB_PAT_EXPIRES: ${GITHUB_PAT_EXPIRES}
      AZUREDEVOPS_PAT: ${AZUREDEVOPS_PAT:-}
      AZUREDEVOPS_PAT_EXPIRES: ${AZUREDEVOPS_PAT_EXPIRES:-}
      GITLAB_PAT: ${GITLAB_PAT:-}
      GITLAB_PAT_EXPIRES: ${GITLAB_PAT_EXPIRES:-}
      # Optional: hostname for self-hosted GitLab (default: gitlab.com)
      GITLAB_HOST: ${GITLAB_HOST:-}

      # Backup settings
      BACKUP_MODE: ${BACKUP_MODE:-option1}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 2 * * *}

      # UI reverse-proxy origin. When the UI is served under a different
      # hostname/port than the container listens on (Synology DSM portal,
      # Traefik, nginx, subdomain, …) list the public URLs here so
      # state-changing requests (add/remove repo, save settings, …) aren't
      # rejected with 403. Comma-separated, include scheme + host + optional
      # port. Example: https://gitecho.example.com,https://nas.local:5000
      PUBLIC_URL: ${PUBLIC_URL:-}

      # Required: key used to encrypt the admin password hash and stored
      # secrets (PATs, SMTP creds). The container refuses to start without
      # it. Generate with: openssl rand -hex 32
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required — generate with "openssl rand -hex 32"}

      # Email notifications (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TO: ${SMTP_TO:-}
      NOTIFY_ON_SUCCESS: ${NOTIFY_ON_SUCCESS:-false}
      PAT_EXPIRY_WARN_DAYS: ${PAT_EXPIRY_WARN_DAYS:-14}
    volumes:
      - gitecho-data:/data
      - gitecho-config:/config
      - gitecho-backups:/backups

volumes:
  gitecho-data:
  gitecho-config:
  gitecho-backups:
