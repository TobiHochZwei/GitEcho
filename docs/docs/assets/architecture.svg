<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'Segoe UI', Roboto, sans-serif" font-size="13">
  <defs>
    <linearGradient id="cyan-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#155e75"/>
      <stop offset="1" stop-color="#0e4459"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#1e293b"/>

  <!-- Container box -->
  <rect x="30" y="20" width="660" height="330" rx="10" fill="none" stroke="#334155" stroke-width="2"/>
  <rect x="30" y="20" width="660" height="36" rx="10" fill="url(#header-grad)"/>
  <rect x="30" y="46" width="660" height="10" fill="url(#header-grad)"/>
  <text x="360" y="44" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">GitEcho Container</text>

  <!-- Astro Web UI box -->
  <rect x="55" y="75" width="190" height="130" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="97" text-anchor="middle" fill="#22d3ee" font-weight="600" font-size="14">Astro.js Web UI</text>
  <line x1="75" y1="107" x2="225" y2="107" stroke="#334155" stroke-width="1"/>
  <text x="150" y="127" text-anchor="middle" fill="#94a3b8" font-size="12">Dashboard &amp; Status</text>
  <text x="150" y="147" text-anchor="middle" fill="#94a3b8" font-size="12">File Browser</text>
  <text x="150" y="167" text-anchor="middle" fill="#94a3b8" font-size="12">Settings &amp; Config</text>
  <text x="150" y="187" text-anchor="middle" fill="#94a3b8" font-size="12">ZIP Downloads</text>

  <!-- Background Scheduler box -->
  <rect x="280" y="75" width="385" height="130" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="472" y="97" text-anchor="middle" fill="#22d3ee" font-weight="600" font-size="14">Background Scheduler (cron)</text>
  <line x1="300" y1="107" x2="645" y2="107" stroke="#334155" stroke-width="1"/>

  <!-- Plugin boxes -->
  <rect x="300" y="120" width="105" height="70" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="352" y="150" text-anchor="middle" fill="#e2e8f0" font-weight="600" font-size="12">GitHub</text>
  <text x="352" y="168" text-anchor="middle" fill="#64748b" font-size="11">gh CLI</text>

  <rect x="420" y="120" width="105" height="70" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="472" y="150" text-anchor="middle" fill="#e2e8f0" font-weight="600" font-size="12">Azure DevOps</text>
  <text x="472" y="168" text-anchor="middle" fill="#64748b" font-size="11">az CLI</text>

  <rect x="540" y="120" width="105" height="70" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="592" y="150" text-anchor="middle" fill="#e2e8f0" font-weight="600" font-size="12">GitLab</text>
  <text x="592" y="168" text-anchor="middle" fill="#64748b" font-size="11">REST API</text>

  <!-- Database box -->
  <rect x="55" y="225" width="600" height="50" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="355" y="247" text-anchor="middle" fill="#22d3ee" font-weight="600" font-size="14">SQLite Database</text>
  <text x="355" y="265" text-anchor="middle" fill="#94a3b8" font-size="12">repos · sync times · checksums · backup runs · stats</text>

  <!-- SMTP box -->
  <rect x="55" y="290" width="600" height="45" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="355" y="312" text-anchor="middle" fill="#22d3ee" font-weight="600" font-size="14">SMTP Notification Service</text>
  <text x="355" y="328" text-anchor="middle" fill="#94a3b8" font-size="12">critical alerts · success summaries · PAT expiry warnings</text>

  <!-- Arrows: UI and plugins → DB -->
  <line x1="150" y1="205" x2="150" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="352" y1="190" x2="352" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="472" y1="190" x2="472" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="592" y1="190" x2="555" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: DB → SMTP -->
  <line x1="355" y1="275" x2="355" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Mount points -->
  <rect x="70" y="400" width="170" height="90" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="155" y="425" text-anchor="middle" fill="#f59e0b" font-weight="600" font-size="14">/data</text>
  <text x="155" y="445" text-anchor="middle" fill="#94a3b8" font-size="11">SQLite DB</text>
  <text x="155" y="461" text-anchor="middle" fill="#94a3b8" font-size="11">Log files</text>
  <text x="155" y="477" text-anchor="middle" fill="#94a3b8" font-size="11">Sync metadata</text>

  <rect x="275" y="400" width="170" height="90" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="425" text-anchor="middle" fill="#f59e0b" font-weight="600" font-size="14">/config</text>
  <text x="360" y="445" text-anchor="middle" fill="#94a3b8" font-size="11">repos.txt</text>
  <text x="360" y="461" text-anchor="middle" fill="#94a3b8" font-size="11">settings.json</text>
  <text x="360" y="477" text-anchor="middle" fill="#94a3b8" font-size="11">secrets.json (encrypted)</text>

  <rect x="480" y="400" width="170" height="90" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="565" y="425" text-anchor="middle" fill="#f59e0b" font-weight="600" font-size="14">/backups</text>
  <text x="565" y="445" text-anchor="middle" fill="#94a3b8" font-size="11">Cloned repos</text>
  <text x="565" y="461" text-anchor="middle" fill="#94a3b8" font-size="11">ZIP archives</text>
  <text x="565" y="477" text-anchor="middle" fill="#94a3b8" font-size="11">Bare mirrors</text>

  <!-- Label -->
  <text x="360" y="510" text-anchor="middle" fill="#64748b" font-size="12" font-style="italic">Mount Points (persistent volumes)</text>

  <!-- Arrows: container → mounts -->
  <line x1="155" y1="350" x2="155" y2="400" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-amber)"/>
  <line x1="360" y1="350" x2="360" y2="400" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-amber)"/>
  <line x1="565" y1="350" x2="565" y2="400" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-amber)"/>

  <defs>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
