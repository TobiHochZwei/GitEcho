<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="GitEcho">
  <title>GitEcho</title>
  <!-- Outer echo ring -->
  <path d="M 32 4 A 28 28 0 0 1 60 32" stroke="#0dcaf0" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <!-- Middle echo ring -->
  <path d="M 32 12 A 20 20 0 0 1 52 32" stroke="#0dcaf0" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Inner echo ring -->
  <path d="M 32 22 A 10 10 0 0 1 42 32" stroke="#0dcaf0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Mirrored lower arc -->
  <path d="M 32 52 A 12 12 0 0 0 44 40" stroke="#0dcaf0" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <!-- Central commit node (git "dot") -->
  <circle cx="32" cy="32" r="6" fill="#0dcaf0"/>
  <circle cx="32" cy="32" r="2.2" fill="#0b0f19"/>
</svg>
