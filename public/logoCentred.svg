<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="2 0 170 64" fill="none" role="img" aria-label="GitEcho">
  <title>GitEcho</title>
  <defs>
    <linearGradient id="ge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Mark: source commit -> echo waves -> external USB hard drive -->
  <g>
    <circle cx="6" cy="32" r="4" fill="url(#ge-grad)"/>
    <path d="M 12 26 A 7 7 0 0 1 12 38" stroke="#e9ecef" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
    <path d="M 18 22 A 11 11 0 0 1 18 42" stroke="#e9ecef" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <path d="M 24 18 A 15 15 0 0 1 24 46" stroke="#e9ecef" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <g stroke="url(#ge-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 38 4 V 12"/>
      <rect x="35" y="12" width="6" height="4" rx="0.6" fill="url(#ge-grad)" stroke="none"/>
      <rect x="28" y="18" width="26" height="30" rx="3.5"/>
      <circle cx="48" cy="24" r="1.6" fill="url(#ge-grad)" stroke="none"/>
      <path d="M 33 34 H 49"/>
      <path d="M 33 40 H 49"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="70" y="42"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="600" fill="#e9ecef" letter-spacing="0.5">
    Git<tspan fill="url(#ge-grad)">Echo</tspan>
  </text>
</svg>
